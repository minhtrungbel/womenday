    <link rel="apple-touch-icon" sizes="512x512" href="https://res.cloudinary.com/dogyjotxv/image/upload/w_512,h_512,c_fill,r_max/v1771757135/logo_ioneoh.png" />

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  </head>

  <body>
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container-fluid px-0">
        <div class="navbar-text-custom">
          A13․2024-2027<br />
          <span>THPT TRẦN KHAI NGUYÊN</span>
        </div>
        <!-- LOGO LÒI ĐUÔI -->
        <a class="navbar-brand logo-outer" href="{{ url_for('home') }}">
          <img
            src="https://res.cloudinary.com/dogyjotxv/image/upload/v1763570718/home_logo_nt0lkn.svg"
            alt="Home"
            class="logo-svg"
          />
        </a>
        <div class="navbar-collapse collapse show" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="{{ url_for('source') }}">SOURCE</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('link') }}">LINK</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ===== LINK SECTION DESIGN ===== -->
    <section class="link-section">
      <!-- Hoa rơi -->
      <div class="flower-layer"></div>

      <!-- Mũi tên -->
      <img
        class="arrow-pc"
        src="https://res.cloudinary.com/dogyjotxv/image/upload/v1772352557/muiten_lbjneb.png"
      />

      <div class="link-content">
        <!-- QR -->
        <div class="qr-wrapper">
          <div class="qr-border">
            <img
              src="https://res.cloudinary.com/dogyjotxv/image/upload/v1772553065/maqr_1_jcoezb.png"
            />
          </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right-box">
          <div class="scan-wrapper">
            <img
              class="scan-text"
              src="https://res.cloudinary.com/dogyjotxv/image/upload/v1772352555/scanhere_jprwuo.png"
            />

            <div class="social-icons-vertical">
              <a
                href="https://drive.google.com/drive/folders/1v3EJICrNSDx5tFGH4sBnHvBDLTRsQLvB"
                target="_blank"
              >
                <img
                  src="https://res.cloudinary.com/dogyjotxv/image/upload/v1772550040/drive_2_g61xfv.svg"
                />
              </a>

              <a href="https://www.instagram.com/a13.tkners/" target="_blank">
                <img
                  src="https://res.cloudinary.com/dogyjotxv/image/upload/v1772550040/ig_1_jamrhz.svg"
                />
              </a>

              <a
                href="https://www.facebook.com/profile.php?id=61565341780254"
                target="_blank"
              >
                <img
                  src="https://res.cloudinary.com/dogyjotxv/image/upload/v1772550040/fb_1_mxdiyp.svg"
                />
              </a>
            </div>
          </div>

          <div class="site-url" id="copyUrl">
            <div class="url-icon">
              <img
                src="https://res.cloudinary.com/dogyjotxv/image/upload/v1772352557/url_ixfc39.svg"
              />
            </div>
            <span id="urlText">womenday-web.onrender.com</span>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const copyBox = document.getElementById("copyUrl");
        const urlText = document.getElementById("urlText");

        copyBox.addEventListener("click", function () {
          const text = urlText.innerText;

          navigator.clipboard.writeText(text).then(() => {
            const original = urlText.innerText;
            urlText.innerText = "Đã sao chép ✓";

            copyBox.style.transform = "scale(0.95)";
            copyBox.style.transition = "0.2s";

            setTimeout(() => {
              urlText.innerText = original;
              copyBox.style.transform = "scale(1)";
            }, 1500);
          });
        });
      });
    </script>
  </body>
</html>
